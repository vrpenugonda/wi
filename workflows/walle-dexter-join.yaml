name: WALLE - Join DEXter CSV with WALLE Snowflake

on:
  workflow_dispatch:
    inputs:
      dex_s3_key:
        description: "S3 key for DEXter CSV (e.g. walle/insights/artifacts/dexter/my_dex.csv)"
        required: true
        type: string
      out_name:
        description: "Output filename (default: merged_dex_walle.csv)"
        required: false
        type: string
        default: "merged_dex_walle.csv"
      chunk_rows:
        description: "DEX chunk rows (default: 200000)"
        required: false
        type: number
        default: 200000
      sf_batch:
        description: "Snowflake IN() batch size (default: 1000)"
        required: false
        type: number
        default: 1000
      sf_progress_every:
        description: "Print Snowflake batch progress every N batches (default: 25)"
        required: false
        type: number
        default: 25
      max_records:
        description: "Max unique DEXter ticket IDs to process (debug). 0 = all (default)."
        required: false
        type: number
        default: 0
      sample_n:
        description: "Sample size for stratified random sample (default: 500). Set 0 to disable."
        required: false
        type: number
        default: 500
      sample_seed:
        description: "Random seed for sampling (default: 7)"
        required: false
        type: number
        default: 7
      sample_max_per_group:
        description: "Max rows kept per (AI_L1, AI_L2, AI_L3, month) group while collecting candidates (default: 2)"
        required: false
        type: number
        default: 2
      sample_out_name:
        description: "Sample output filename (default: <out_name>_sampled.csv)"
        required: false
        type: string
        default: ""
      report_name:
        description: "Excel report filename (default: dexter_vs_walle_report.xlsx)"
        required: false
        type: string
        default: "dexter_vs_walle_report.xlsx"
      llm_judge:
        description: "Enable LLM-as-judge sheets (Metric 6). Requires Azure OpenAI secrets in this workflow."
        required: false
        type: boolean
        default: false
      llm_judge_n:
        description: "How many sampled rows to judge (default: 200 if enabled)."
        required: false
        type: number
        default: 200
      llm_judge_seed:
        description: "Random seed for judge A/B assignment + sampling (default: 7)"
        required: false
        type: number
        default: 7
      llm_judge_max_rpm:
        description: "Max LLM judge requests per minute (default: 30). Lower if you hit 429s."
        required: false
        type: number
        default: 30
      env:
        description: "Target environment"
        required: false
        type: choice
        options: [dev, stage, prod]
        default: prod

concurrency:
  group: walle-dexter-join
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  dexter_join:
    name: Join DEXter with WALLE
    runs-on: uhg-runner
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        shell: bash
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure PyPI authentication
        shell: bash
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ENTERPRISE_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ENTERPRISE_TOKEN }}
        run: |
          rm -f $HOME/.netrc 2>/dev/null || true
          echo "machine edgeinternal1uhg.uhg.com" > $HOME/.netrc
          echo "login ${ARTIFACTORY_USERNAME}" >> $HOME/.netrc
          echo "password ${ARTIFACTORY_PASSWORD}" >> $HOME/.netrc
          chmod 600 $HOME/.netrc

      - name: Install dependencies
        shell: bash
        timeout-minutes: 10
        env:
          UV_INDEX_URL: https://${{ secrets.ENTERPRISE_USERNAME }}:${{ secrets.ENTERPRISE_TOKEN }}@edgeinternal1uhg.uhg.com/artifactory/api/pypi/docx-pypi-vir/simple
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --frozen

      - name: Download DEXter CSV from S3
        shell: bash
        env:
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL || 'https://s3api-core.optum.com' }}
          DEX_S3_KEY: ${{ inputs.dex_s3_key }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          uv run python - << 'PY'
          import os
          from pathlib import Path
          import boto3

          bucket = os.environ["S3_BUCKET_NAME"]
          key = os.environ["DEX_S3_KEY"]
          endpoint = os.environ["S3_ENDPOINT_URL"]

          out_dir = Path("data/input")
          out_dir.mkdir(parents=True, exist_ok=True)
          out_path = out_dir / "dexter.csv"

          s3 = boto3.client(
              "s3",
              aws_access_key_id=os.environ["S3_ACCESS_KEY"],
              aws_secret_access_key=os.environ["S3_SECRET_KEY"],
              endpoint_url=endpoint,
          )

          print(f"Downloading s3://{bucket}/{key} -> {out_path}", flush=True)
          s3.download_file(bucket, key, str(out_path))
          print("Download complete", flush=True)
          PY

      - name: Run join script
        shell: bash
        env:
          # Snowflake creds (same pattern as other workflows)
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_CERTIFICATE: ${{ secrets.SNOWFLAKE_CERTIFICATE }}
          SNOWFLAKE_TABLE: ${{ secrets.SNOWFLAKE_TABLE || 'WALLE_CLASSIFIED_INCIDENTS' }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          mkdir -p data/output

          uv run python scripts/join_dexter_with_walle_snowflake.py \
            --dex-csv "data/input/dexter.csv" \
            --out "data/output/${{ inputs.out_name }}" \
            --chunk-rows "${{ inputs.chunk_rows }}" \
            --sf-batch "${{ inputs.sf_batch }}" \
            --sf-progress-every "${{ inputs.sf_progress_every }}" \
            --max-records "${{ inputs.max_records }}" \
            --sample-n "${{ inputs.sample_n }}" \
            --sample-seed "${{ inputs.sample_seed }}" \
            --sample-max-per-group "${{ inputs.sample_max_per_group }}"

          # If sample_out_name is provided, rename the sampled file accordingly.
          if [[ -n "${{ inputs.sample_out_name }}" ]]; then
            SAMPLE_DEFAULT="data/output/$(basename "${{ inputs.out_name }}" .csv)_sampled.csv"
            if [[ -f "$SAMPLE_DEFAULT" ]]; then
              mv "$SAMPLE_DEFAULT" "data/output/${{ inputs.sample_out_name }}"
              echo "Renamed sample output to: data/output/${{ inputs.sample_out_name }}"
            fi
          fi

      - name: Run metrics on sampled data
        shell: bash
        env:
          # Azure OpenAI auth (same pattern as classification workflows)
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_DEPLOYMENT: ${{ secrets.AZURE_DEPLOYMENT }}
          API_VERSION: ${{ secrets.API_VERSION }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          TOKEN_URL: ${{ secrets.TOKEN_URL }}
          SCOPE: ${{ secrets.SCOPE }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          X_UPSTREAM_ENV: ${{ inputs.env == 'prod' && 'prod' || 'nonprod' }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          # Prefer running metrics on the sampled CSV.
          SAMPLE_PATH=""
          if [[ -n "${{ inputs.sample_out_name }}" && -f "data/output/${{ inputs.sample_out_name }}" ]]; then
            SAMPLE_PATH="data/output/${{ inputs.sample_out_name }}"
          else
            SAMPLE_DEFAULT="data/output/$(basename "${{ inputs.out_name }}" .csv)_sampled.csv"
            if [[ -f "$SAMPLE_DEFAULT" ]]; then
              SAMPLE_PATH="$SAMPLE_DEFAULT"
            fi
          fi

          if [[ -z "$SAMPLE_PATH" ]]; then
            echo "::error::No sampled CSV found. Ensure sample_n > 0 and the join step produced a *_sampled.csv file."
            exit 1
          fi

          echo "Running metrics on sample: $SAMPLE_PATH"
          
          # If LLM judge enabled, fetch an Azure AD token and pass Azure OpenAI env vars expected by Metric 6.
          if [[ "${{ inputs.llm_judge }}" == "true" ]]; then
            echo "LLM judge enabled. Fetching Azure AD token for Azure OpenAI..."
            # NOTE: Avoid heredocs inside YAML-indented bash blocks (bash requires the terminator at column 0).
            TOKEN="$(uv run python -c "from insights.utils.auth import get_azure_ad_token; print(get_azure_ad_token())")"
            export AZURE_OPENAI_API_KEY="$TOKEN"
            export AZURE_OPENAI_ENDPOINT="${AZURE_ENDPOINT}"
            export AZURE_OPENAI_DEPLOYMENT_NAME="${AZURE_DEPLOYMENT}"
            export AZURE_OPENAI_API_VERSION="${API_VERSION}"
            # pydantic-ai/OpenAI clients also look for OPENAI_API_VERSION
            export OPENAI_API_VERSION="${API_VERSION}"
          fi

          ARGS=(--in "$SAMPLE_PATH" --out "data/output/${{ inputs.report_name }}")
          if [[ "${{ inputs.llm_judge }}" == "true" ]]; then
            ARGS+=(--llm-judge --llm-judge-n "${{ inputs.llm_judge_n }}" --llm-judge-seed "${{ inputs.llm_judge_seed }}")
            ARGS+=(--llm-judge-max-rpm "${{ inputs.llm_judge_max_rpm }}")
          fi

          uv run python scripts/dexter_vs_walle_metrics.py "${ARGS[@]}"

      - name: Upload merged output artifact
        uses: actions/upload-artifact@v4
        with:
          name: dexter-walle-join-${{ github.run_id }}
          path: |
            data/output/${{ inputs.out_name }}
            data/output/${{ inputs.sample_out_name }}
            data/output/*_sampled.csv
            data/output/${{ inputs.report_name }}
          retention-days: 7

